<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>motion-assets gallery</title>
  <style>
    body{margin:0;background:#050505;color:#f4fff8;font-family:Inter,system-ui,sans-serif}
    main{min-height:100vh;display:grid;place-items:center;padding:32px}
    .card{width:min(92vw,680px);padding:40px;border:1px solid rgba(32,255,160,.2);border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.015));text-align:center}
    img{width:128px;height:128px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(20,245,154,.24))}
    code{display:block;overflow:auto;padding:14px;border-radius:12px;background:#000;color:#bfffe0;text-align:left}
    a{color:#20f5a0}
  </style>
</head>
<body>
<main>
  <section class="card">
    <p>motion-assets</p>
    <picture>
      <source srcset="../assets/effects/neon-triangle-morph/motion-transparent.webp" type="image/webp" />
      <img src="../assets/effects/neon-triangle-morph/motion.gif" alt="Neon Triangle Morph" />
    </picture>
    <h1>Neon Triangle Morph</h1>
    <p>Portable optimized motion asset: WebP + GIF fallback.</p>
    <code>&lt;source srcset="assets/effects/neon-triangle-morph/motion-transparent.webp" type="image/webp" /&gt;</code>
  </section>
</main>
</body>
</html>
