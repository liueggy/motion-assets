<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Motion Assets 动效资源库</title><style>
:root{color-scheme:light;--bg:#f6f7f4;--card:#fff;--ink:#1d211f;--muted:#68736d;--line:#dfe5df;--line2:#cbd6ce;--accent:#167a55;--chip:#f0f3ef;--shadow:0 12px 32px rgba(26,42,32,.08);font:15px/1.65 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}a{color:inherit}.wrap{width:min(1180px,calc(100vw - 32px));margin:0 auto}.top{position:sticky;top:0;z-index:20;background:rgba(246,247,244,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.nav{height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}.brand{display:flex;align-items:center;gap:10px;font-weight:800}.logo{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#167a55,#9dc27b)}.nav a{font-size:14px;color:var(--muted);text-decoration:none}.hero{padding:34px 0 20px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}h1{margin:0;font-size:clamp(28px,4.2vw,48px);line-height:1.08;letter-spacing:-.045em}.lead{margin:10px 0 0;color:var(--muted);max-width:720px}.count{padding:13px 16px;border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow);white-space:nowrap}.count b{font-size:28px}.controls{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin:10px 0 20px}.search{height:46px;display:flex;align-items:center;gap:10px;padding:0 14px;border:1px solid var(--line);border-radius:14px;background:var(--card)}.search input{width:100%;border:0;outline:0;background:transparent;font:inherit}.chips{display:flex;gap:8px;overflow:auto}.chip{height:42px;border:1px solid var(--line);border-radius:999px;background:var(--card);color:var(--muted);padding:0 14px;cursor:pointer;font:inherit;white-space:nowrap}.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}.note{margin:-4px 0 18px;color:var(--muted);font-size:13px}.grid{display:g const PREFIX='';const data=JSON.parse(document.getElementById('asset-data').textContent);const grid=document.getElementById('grid'),empty=document.getElementById('empty'),search=document.getElementById('search'),chips=document.getElementById('chips');let category='all';const names={all:'全部',effects:'特效',loaders:'加载',stickers:'贴纸',icons:'图标',transitions:'转场',logos:'标志',backgrounds:'背景'};const categories=['all',...Array.from(new Set(data.map(x=>x.category))).sort()];function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}function url(a,f){return PREFIX+a._path+'/'+f}function cdn(a,f){return 'https://cdn.jsdelivr.net/gh/liueggy/motion-assets@main/'+a._path+'/'+f}chips.innerHTML=categories.map(c=>`<button class="chip ${c==='all'?'active':''}" data-cat="${esc(c)}">${esc(names[c]||c)}</button>`).join('');chips.addEventListener('click',e=>{const b=e.target.closest('[data-cat]');if(!b)return;category=b.dataset.cat;document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.cat===category));render()});search.addEventListener('input',render);function render(){const q=search.value.trim().toLowerCase();const filtered=data.filter(a=>{const hay=[a.name,a.category,a.description,...(a.tags||[])].join(' ').toLowerCase();return(category==='all'||a.category===category)&&(!q||hay.includes(q))});grid.innerHTML=filtered.map(a=>{const preview=a._transparent||a._webp||a._gif;const fallback=a._gif||preview;const tags=(a.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('');return `<article class="card"><div class="preview"><span class="badge">${esc(names[a.category]||a.category)} · 透明预览</span><picture><source srcset="${url(a,preview)}" type="image/webp"><img loading="lazy" src="${url(a,fallback)}" alt="${esc(a.name)}"></picture></div><div class="body"><h2>${esc(a.name)}</h2><p class="desc">${esc(a.description)}</p><div class="tags">${tags}</div><div class="meta"><span><b>${a.duration||'—'}s</b>时长</span><span><b>${(a.dimensions||[]).join('×')||'—'}</b>尺寸</span><span><b>${a.transparentPreview?'有':'生成'}</b>透明</span></div><div class="actions"><code>${esc(cdn(a,preview))}</code><div class="row"><a class="btn primary" href="${url(a,preview)}">打开透明版</a><a class="btn" href="${url(a,'metadata.json')}">元数据</a></div></div></div></article>`}).join('');empty.style.display=filtered.length?'none':'block'}render();
</script></body></html>
